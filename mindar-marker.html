<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <title>CARTOMETRIAS BRANDAS V3 (2026) - Grupo Realidades (CAP-ECA-USP)</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
        <script src="/src/video-timing.js"></script>
        <link rel="stylesheet" href="styles.css">  
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    </head>

    <body>
        <!-- MindAR -->
        <a-scene    a-scene mindar-image="imageTargetSrc: ./targets.mind;
                                          filterMinCF: 0.1;
                                          filterBeta: 100"
                    color-space="sRGB"
                    renderer="colorManagement: true,
                        physicallyCorrectLights"
                    vr-mode-ui="enabled: false"
                    xr-mode-ui="enabled: false"
                    device-orientation-permission-ui="enabled: false"
                    stats>

            <!-- ASSETS -->
            <a-assets>
                <video id="seg01"
                    src="/videos/cartometrias-brandas-file-v1-seg01.mp4"
                    autoplay
                    loop="true"
                    loop="true"
                    muted="true">
                </video>
            </a-assets>

            <!-- CÂMERA -->
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
            <!-- CENA 3D -->
            <a-entity mindar-image-target="targetIndex: 0">

                <a-box  id="cube"
                        position="0 0 0.5"
                        material="src: #seg01;
                                    repeat: 1"
                        video-sync-time>
                </a-box>

                <a-entity light="type: ambient; color: #BBB"></a-entity>

            </a-entity>
        
        </a-scene>
    </body>
