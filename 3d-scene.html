<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <title>Visualizador 3D de Maçãs</title>
        <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
        <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
        <script src="texture-changer.js"></script>
        <link rel="stylesheet" href="styles.css">  
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    </head>

    <body style="margin : 0px; overflow: hidden;">

        <button id="change-texture-btn">></button>

        <!-- A-FRAME -->
        <a-scene xr-mode-ui="enabled: false" stats>
        
            <!-- ASSETS -->
            <a-assets>
                <a-asset-item id="model" src="Apple-3D-model-v001.obj"></a-asset-item>
            </a-assets>
        
            <!-- CENA 3D -->
            <a-entity   id="apple"
                        obj-model="obj: #model"
                        position="0 0 0"
                        rotation="0 0 0"
                        scale="0.5 0.5 0.5">
            </a-entity>

            <a-circle   color="#CCC"
                        radius="0.5"
                        position="0 -0.51 0"
                        rotation="-90 0 0"
                        segments="128">
            </a-circle>

        
            <!-- LIGHTING -->
            <a-entity light="type: ambient; color: #BBB"></a-entity>
        
            <a-entity   light="type: point"
                        position="1 1.5 2"
                        intensity="1.0"
                        color="#FFF">
            </a-entity>
        
        
        
            <!-- CÂMERA -->
            <a-entity   camera
                        orbit-controls="target: 0 0 0;
                                        initialPosition: 0 0 1.5;
                                        autoRotate: true;
                                        autoRotateSpeed: 2.0;
                                        enableDamping: true;
                                        dampingFactor: 0.1">
            </a-entity>

        </a-scene>
    </body>
