<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <title>CARTOMETRIAS BRANDAS V3 (2026) - Grupo Realidades (CAP-ECA-USP)</title>
        <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
        <script src="/src/video-timing.js"></script>
        <script src="/src/sync-video-hls.js"></script>
        <link rel="stylesheet" href="styles.css">  
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    </head>

    <body style="margin : 0px; overflow: hidden;">
        <!-- AR.JS -->
        <a-scene    embedded arjs="detectionMode: mono_and_matrix;
                    matrixCodeType: 4x4_BCH_13_5_5"
                    xr-mode-ui="enabled: false"
                    stats>

            <!-- ASSETS -->
            <a-assets>
                
            </a-assets>
        
            <!-- CENA 3D -->
            <a-marker type="barcode" value="5">

                <a-box  id="cube"
                        position="0 0.5 0"
                        material="src: #video;
                                    repeat: 1"
                        sync-video-hls>
                </a-box>

                <a-entity light="type: ambient; color: #BBB"></a-entity>

            </a-marker>

            <!-- CÂMERA -->
            <a-entity id="arjs-camera" camera camerafix="false"></a-entity>
        
            <!-- VÍDEO -->
            <video  id="video"
                    preload="auto"
                    loop="true" muted="true"
                    playsinline
                    webkit-playsinline 
                    crossorigin="anonymous"
                    style="display:none;">
            </video>

        </a-scene>
    </body>
